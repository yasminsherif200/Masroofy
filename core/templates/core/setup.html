<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masroofy - Setup</title>
  
  <link rel="stylesheet" href="CSS/reset.css">
  <link rel="stylesheet" href="CSS/variables.css">
  <link rel="stylesheet" href="CSS/layout.css">
  <link rel="stylesheet" href="CSS/components.css">
  <link rel="stylesheet" href="CSS/pages.css">
  <link rel="stylesheet" href="CSS/main.css">
  
  <style>
    body {
      background: var(--color-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font-body);
    }
    .setup-container {
      background: var(--color-white);
      padding: var(--space-8);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }
    .setup-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }
    .setup-subtitle {
      color: var(--color-text-muted);
      margin-bottom: var(--space-8);
    }
    .form-group { margin-bottom: var(--space-5); text-align: left; }
    .form-group label {
      display: block;
      margin-bottom: var(--space-2);
      font-weight: var(--weight-semibold);
      color: var(--color-text);
    }
    .form-control {
      width: 100%;
      padding: var(--space-4);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--text-lg);
      background: var(--color-off-white);
      color: var(--color-text);
    }
    .form-control:focus { outline: none; border-color: var(--color-primary); }
    .form-control.error { border-color: var(--color-danger); }
    .btn-primary {
      width: 100%;
      padding: var(--space-4);
      background: var(--color-primary);
      color: white; border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      cursor: pointer;
      margin-top: var(--space-4);
      transition: background var(--duration-fast);
      box-shadow: var(--shadow-coral);
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .skip-link {
      display: block;
      margin-top: var(--space-4);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      text-decoration: none;
    }
    .skip-link:hover { color: var(--color-text); }
  </style>
</head>
<body>
  <div class="setup-container">
    <h1 class="setup-title">Let's Get Started! 🎯</h1>
    <p class="setup-subtitle">Set your initial balance and monthly budget so we can help you track your spending.</p>
    
    <form id="setupForm">
      <div class="form-group">
        <label for="balance">Initial Balance ($)</label>
        <input type="number" id="balance" name="balance" class="form-control" placeholder="e.g. 500" min="0" step="0.01" required>
      </div>
      <div class="form-group">
        <label for="budget">Monthly Budget ($)</label>
        <input type="number" id="budget" name="budget" class="form-control" placeholder="e.g. 300" min="0" step="0.01" required>
      </div>
      
      <button type="submit" class="btn-primary">Go to Dashboard 🚀</button>
    </form>
    <a href="dashboard.html" class="skip-link">Skip for now →</a>
  </div>

  <script type="module">
    import { FormValidator } from './JS/ui.js';
    import { AppContainer } from './JS/core.js';
    import './JS/services.js';

    // Redirect to login if not authenticated
    try {
      AppContainer.get('authService').requireAuth();
    } catch(e) {
      // requireAuth already redirects
    }
    
    const form = document.getElementById('setupForm');
    
    const schema = {
      balance: [
        { rule: 'required', message: 'Balance is required' },
        { rule: 'numeric',  message: 'Must be a number' },
        { rule: 'min',      value: 0, message: 'Balance cannot be negative' }
      ],
      budget: [
        { rule: 'required', message: 'Budget is required' },
        { rule: 'numeric',  message: 'Must be a number' },
        { rule: 'min',      value: 0, message: 'Budget cannot be negative' }
      ]
    };
    
    const validator = new FormValidator(schema);
    validator.bindLive(form);
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const values   = Object.fromEntries(formData.entries());
      
      const { valid, errors } = validator.validate(values);
      if (valid) {
        // Seed an opening balance as an income entry
        const today = new Date().toISOString().split('T')[0];
        const balance = Number(values.balance);
        if (balance > 0) {
          try {
            AppContainer.get('expenseService').add({
              amount:      balance,
              category:    'other',
              date:        today,
              type:        'income',
              description: 'Opening balance',
              note:        'Opening balance'
            });
          } catch(e) { /* ignore */ }
        }
        // Save budget preference
        AppContainer.get('settingsService').update({ monthlyIncome: Number(values.budget) });
        window.location.href = 'dashboard.html';
      } else {
        validator.applyErrors(form, errors);
      }
    });
  </script>
</body>
</html>
