<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masroofy - Setup</title>
  
  <link rel="stylesheet" href="CSS/reset.css">
  <link rel="stylesheet" href="CSS/variables.css">
  <link rel="stylesheet" href="CSS/layout.css">
  <link rel="stylesheet" href="CSS/components.css">
  <link rel="stylesheet" href="CSS/pages.css">
  <link rel="stylesheet" href="CSS/main.css">
  
  <style>
    body {
      background: var(--color-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font-body);
    }
    .setup-container {
      background: var(--color-white);
      padding: var(--space-8);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }
    .setup-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }
    .setup-subtitle {
      color: var(--color-text-muted);
      margin-bottom: var(--space-8);
    }
    .form-group {
      margin-bottom: var(--space-5);
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: var(--space-2);
      font-weight: var(--weight-semibold);
      color: var(--color-text);
    }
    .form-control {
      width: 100%;
      padding: var(--space-4);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--text-lg);
      background: var(--color-off-white);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--color-primary);
    }
    .btn-primary {
      width: 100%;
      padding: var(--space-4);
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      cursor: pointer;
      margin-top: var(--space-4);
      transition: background var(--duration-fast);
      box-shadow: var(--shadow-coral);
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
    }
  </style>
</head>
<body>
  <nav style="position: absolute; top: 0; left: 0; width: 100%; padding: var(--space-4) var(--space-8); display: flex; justify-content: space-between; align-items: center; background: rgba(253, 252, 250, 0.8); backdrop-filter: blur(8px); border-bottom: 1px solid var(--color-border); z-index: 10;">
    <div style="font-family: var(--font-display); font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--color-text);">💸 Masroofy</div>
    <div style="display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap; justify-content: flex-end;">
      <a href="dashboard.html" style="color: var(--color-text); text-decoration: none; font-weight: var(--weight-medium); font-size: var(--text-sm);">Dashboard</a>
      <a href="add_expense.html" style="color: var(--color-text); text-decoration: none; font-weight: var(--weight-medium); font-size: var(--text-sm);">Add Expense</a>
      <a href="history.html" style="color: var(--color-text); text-decoration: none; font-weight: var(--weight-medium); font-size: var(--text-sm);">History</a>
      <a href="reports.html" style="color: var(--color-text); text-decoration: none; font-weight: var(--weight-medium); font-size: var(--text-sm);">Reports</a>
      <a href="settings.html" style="color: var(--color-text); text-decoration: none; font-weight: var(--weight-medium); font-size: var(--text-sm);">Settings</a>
      <a href="setup.html" style="color: var(--color-text); text-decoration: none; font-weight: var(--weight-medium); font-size: var(--text-sm);">Setup</a>
      <div style="width: 1px; height: 16px; background: var(--color-border); margin: 0 var(--space-2);"></div>
      <a href="login.html" style="color: var(--color-danger); text-decoration: none; font-weight: var(--weight-medium); font-size: var(--text-sm);">Logout</a>
    </div>
  </nav>

  <div class="setup-container">
    <h1 class="setup-title">Let's Get Started! 🎯</h1>
    <p class="setup-subtitle">Set your initial balance and monthly goal so we can help you track your spending.</p>
    
    <form id="setupForm">
      <div class="form-group">
        <label for="balance">Initial Balance ($)</label>
        <input type="number" id="balance" name="balance" class="form-control" placeholder="e.g. 500" required>
      </div>
      <div class="form-group">
        <label for="budget">Monthly Budget ($)</label>
        <input type="number" id="budget" name="budget" class="form-control" placeholder="e.g. 300" required>
      </div>
      
      <button type="submit" class="btn-primary">Go to Dashboard 🚀</button>
    </form>
  </div>

  <script type="module">
    import { FormValidator } from './JS/ui.js';
    
    const form = document.getElementById('setupForm');
    
    const schema = {
      balance: [
        { rule: 'required', message: 'Balance is required' },
        { rule: 'numeric', message: 'Must be a number' }
      ],
      budget: [
        { rule: 'required', message: 'Budget is required' },
        { rule: 'numeric', message: 'Must be a number' }
      ]
    };
    
    const validator = new FormValidator(schema);
    validator.bindLive(form);
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const values = Object.fromEntries(formData.entries());
      
      const { valid, errors } = validator.validate(values);
      if (valid) {
        // In a real app we'd save this to the user's profile
        window.location.href = 'dashboard.html';
      } else {
        validator.applyErrors(form, errors);
      }
    });
  </script>
</body>
</html>
