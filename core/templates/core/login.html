<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masroofy - Login</title>
  
  <link rel="stylesheet" href="CSS/reset.css">
  <link rel="stylesheet" href="CSS/variables.css">
  <link rel="stylesheet" href="CSS/layout.css">
  <link rel="stylesheet" href="CSS/components.css">
  <link rel="stylesheet" href="CSS/pages.css">
  <link rel="stylesheet" href="CSS/main.css">
  
  <style>
    body {
      background: linear-gradient(135deg, var(--color-coral-subtle), var(--color-blue-subtle));
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font-body);
    }
    .auth-container {
      background: var(--color-surface);
      padding: var(--space-8);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .auth-logo { font-size: var(--text-4xl); margin-bottom: var(--space-2); }
    .auth-title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--color-text);
      margin-bottom: var(--space-6);
    }
    .form-group { margin-bottom: var(--space-4); text-align: left; }
    .form-group label {
      display: block;
      margin-bottom: var(--space-1);
      font-weight: var(--weight-medium);
      color: var(--color-text-muted);
    }
    .form-control {
      width: 100%;
      padding: var(--space-3);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color var(--duration-fast);
      background: var(--color-off-white);
      color: var(--color-text);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--color-primary);
      background: var(--color-surface);
    }
    .form-control.error { border-color: var(--color-danger); }
    .btn-primary {
      width: 100%;
      padding: var(--space-3);
      background: var(--color-primary);
      color: white; border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      cursor: pointer;
      margin-top: var(--space-4);
      transition: background var(--duration-fast), transform var(--duration-fast);
      box-shadow: var(--shadow-coral);
    }
    .btn-primary:hover { background: var(--color-primary-hover); transform: translateY(-2px); }
    .auth-footer { margin-top: var(--space-6); color: var(--color-text-muted); }
    .auth-footer a { color: var(--color-accent); font-weight: var(--weight-semibold); text-decoration: none; }
    .demo-hint {
      margin-top: var(--space-4);
      padding: var(--space-3);
      background: var(--color-blue-subtle);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-align: left;
    }
    .demo-hint strong { color: var(--color-accent); }
  </style>
</head>
<body>
  <nav style="position: absolute; top: 0; left: 0; width: 100%; padding: var(--space-4) var(--space-8); display: flex; justify-content: space-between; align-items: center; background: rgba(253,252,250,0.8); backdrop-filter: blur(8px); border-bottom: 1px solid var(--color-border); z-index: 10;">
    <div style="font-family: var(--font-display); font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--color-text);">💸 Masroofy</div>
    <div style="display: flex; gap: var(--space-4); align-items: center;">
      <a href="login.html" style="color: var(--color-primary); text-decoration: none; font-weight: var(--weight-bold); font-size: var(--text-sm);">Login</a>
      <a href="signup.html" style="color: white; text-decoration: none; font-weight: var(--weight-bold); font-size: var(--text-sm); background: var(--color-primary); padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);">Sign Up</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-logo">💸</div>
    <h1 class="auth-title">Welcome Back</h1>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn-primary">Sign In 🚀</button>
    </form>

    <div class="demo-hint">
      <strong>New here?</strong> Create an account to get started — your data is stored locally in your browser.
    </div>
    
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>

  <script type="module">
    import { FormValidator } from './JS/ui.js';
    import { AppContainer } from './JS/core.js';
    import './JS/services.js';
    
    // If already logged in, redirect to dashboard
    if (AppContainer.get('authService').isLoggedIn) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    
    const schema = {
      email: [
        { rule: 'required', message: 'Email is required' },
        { rule: 'email',    message: 'Enter a valid email address' }
      ],
      password: [
        { rule: 'required', message: 'Password is required' }
      ]
    };
    
    const validator = new FormValidator(schema);
    validator.bindLive(form);
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const values   = Object.fromEntries(formData.entries());
      
      const { valid, errors } = validator.validate(values);
      if (valid) {
        try {
          AppContainer.get('authService').login(values.email, values.password);
          window.location.href = 'dashboard.html';
        } catch (err) {
          validator.applyErrors(form, { email: err.message });
        }
      } else {
        validator.applyErrors(form, errors);
      }
    });
  </script>
</body>
</html>
