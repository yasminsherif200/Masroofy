<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masroofy - Budgeting for the Youth</title>
  
  <!-- CSS Links -->
  <link rel="stylesheet" href="CSS/reset.css">
  <link rel="stylesheet" href="CSS/variables.css">
  <link rel="stylesheet" href="CSS/layout.css">
  <link rel="stylesheet" href="CSS/components.css">
  <link rel="stylesheet" href="CSS/pages.css">
  <link rel="stylesheet" href="CSS/main.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside id="appSidebar" class="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Topbar -->
      <header id="appTopbar" class="topbar"></header>

      <!-- Page Content -->
      <div class="page-content">
        <!-- Content goes here -->
        <div class="card">
          <h2>Welcome to Masroofy! 🚀</h2>
          <p>This is the base layout structure.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Script Modules -->
  <script type="module">
    import { AppContainer } from './JS/core.js';
    import { SidebarComponent, TopbarComponent } from './JS/ui.js';
    import './JS/services.js';
    
    AppContainer.get('authService').requireAuth();
    
    // Initialize UI
    const sidebar = new SidebarComponent('#appSidebar', AppContainer.get('authService'), 'dashboard').mount();
    const topbar = new TopbarComponent('#appTopbar', { title: 'Masroofy', subtitle: "Let's crush those budget goals!" }).mount();
  </script>
</body>
</html>
