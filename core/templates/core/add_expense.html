{% extends 'core/base.html' %}

{% block content %}

<div class="card" style="max-width: 500px;">
    <h2>Add Expense</h2>

    <form method="POST">
        {% csrf_token %}

        <input name="amount" placeholder="Amount">
        <input name="category" placeholder="Category">
        <input name="date" type="date">

        <button class="btn">Add</button>
    </form>

</div>

{% endblock %}
